<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family News Briefing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .subscribe {
      display: inline-block;
      background: #f60;
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 32px;
    }
    .subscribe:hover { background: #e55; }
    .episode {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .episode-date {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .episode-desc {
      color: #555;
      font-size: 0.85rem;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    audio {
      width: 100%;
      height: 40px;
    }
    .empty {
      color: #999;
      font-style: italic;
      padding: 40px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Family News Briefing</h1>
  <p class="subtitle">Daily five-minute news for the family</p>
  <a class="subscribe" href="feed.xml">Subscribe via RSS</a>
  <div id="episodes"><p class="empty">Loading episodes...</p></div>

  <script>
    async function loadEpisodes() {
      try {
        const res = await fetch("feed.xml");
        const text = await res.text();
        const xml = new DOMParser().parseFromString(text, "text/xml");
        const items = xml.querySelectorAll("item");
        const container = document.getElementById("episodes");

        if (items.length === 0) {
          container.innerHTML = '<p class="empty">No episodes yet.</p>';
          return;
        }

        container.innerHTML = "";
        items.forEach(item => {
          const title = item.querySelector("title")?.textContent || "Episode";
          const desc = item.querySelector("description")?.textContent || "";
          const url = item.querySelector("enclosure")?.getAttribute("url") || "";

          const div = document.createElement("div");
          div.className = "episode";
          div.innerHTML = `
            <div class="episode-date">${title}</div>
            <div class="episode-desc">${desc}</div>
            <audio controls preload="none" src="${url}"></audio>
          `;
          container.appendChild(div);
        });
      } catch (e) {
        document.getElementById("episodes").innerHTML =
          '<p class="empty">Could not load episodes. Check back later.</p>';
      }
    }
    loadEpisodes();
  </script>
</body>
</html>
